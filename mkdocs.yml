site_name: DNA Assembler ML
site_description: Python ML module for de Bruijn junction resolution
docs_dir: ml/docs
repo_url: https://github.com/FilipP47/dna-assembler-ml

theme:
  name: material
  palette:
    scheme: slate
    primary: teal

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [ml]
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google
            merge_init_into_class: true

nav:
  - Home: index.md
  - API Reference:
    - Data: api/data.md
    - Models: api/models.md
    - Training: api/training.md
